[tool.ruff]
select = ["E", "F", "I", "B", "C4", "UP"]
ignore = []
line-length = 88
target-version = "py311"

[tool.ruff.isort]
known-first-party = ["api", "core", "models", "schemas", "services"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = [".venv", "alembic"]

[[tool.mypy.overrides]]
module = "sqlalchemy.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
